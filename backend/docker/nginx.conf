server {
    listen 8080;
    server_name _;
    root /var/www/public;
    index index.php;

    # INFRA-03: Hide server version
    server_tokens off;

    # INFRA-06: Cap request body at 2M (no file uploads exist)
    client_max_body_size 2M;

    # INFRA-05: HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # INFRA-07: Strict API-only CSP
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # INFRA-01: Block path traversal -- any URI containing ".." returns 403
    location ~* /\.\. {
        return 403;
    }

    # Main location
    location / {
        # INFRA-04: Restrict HTTP methods
        if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS|PATCH)$) {
            return 405;
        }

        # CORS preflight -- MUST repeat security headers (add_header inheritance trap)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://tip.aquasecure.ai' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, X-Requested-With, X-XSRF-TOKEN, Accept, Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '3600';
            # Repeat security headers (inheritance is lost in if blocks)
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    # INFRA-02: Only allow /index.php through FastCGI
    location = /index.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block hidden files (except .well-known)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
